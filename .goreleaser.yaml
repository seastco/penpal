version: 2

builds:
  - id: penpal
    main: ./cmd/penpal
    binary: penpal
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

  - id: server
    main: ./cmd/server
    binary: penpal-server
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: client
    builds: [penpal]
    format: tar.gz
    name_template: "penpal-{{ .Os }}-{{ .Arch }}"

  - id: server
    builds: [server]
    format: tar.gz
    name_template: "penpal-server-{{ .Os }}-{{ .Arch }}"

release:
  extra_files:
    - glob: data/graph.json

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
