version: 2

builds:
  - id: penpal
    main: ./cmd/penpal
    binary: penpal
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

  - id: server
    main: ./cmd/server
    binary: penpal-server
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: client
    ids: [penpal]
    name_template: "penpal-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

  - id: server
    ids: [server]
    name_template: "penpal-server-{{ .Os }}-{{ .Arch }}"

release:
  extra_files:
    - glob: data/graph.json
    - glob: data/international_cities.json

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
